id = "elasticsearch"
name = "Elasticsearch"
version = "0.0.1"
schema_version = 1
authors = ["Daryle Foulke <daryle.foulke@outlook.com>"]
description = "Syntax highlighting and diagnostics for Elasticsearch Console (.es) request files"
repository = "https://github.com/foulkelore/zed-elasticsearch"

[grammars.elasticsearch]
repository = "https://github.com/foulkelore/tree-sitter-elasticsearch"
