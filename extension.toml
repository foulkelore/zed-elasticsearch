id = "elasticsearch"
name = "Elasticsearch"
version = "0.1.0"
schema_version = 1
authors = ["Daryle Foulke <daryle.foulke@outlook.com>"]
description = "Unofficial language support (highlighting + diagnostics) for Elasticsearch Console (.es) request files, like Kibana Dev Tools"
repository = "https://github.com/foulkelore/zed-elasticsearch"

[grammars.elasticsearch]
# Local development: load the grammar from the local filesystem for fast
# iteration (editing grammar.js + regenerating shows up after a cache clear +
# reinstall, with no push/rev bump needed).
#
# Release value (used when publishing to the Zed registry):
#   repository = "https://github.com/foulkelore/tree-sitter-elasticsearch"
#   rev = "2194e3859d01cdd50b9585b92e5f15904f105f11"
repository = "file:///Users/TXI4N9D/code/foulkelore/Zed/tree-sitter-elasticsearch"
rev = "2194e3859d01cdd50b9585b92e5f15904f105f11"

[language_servers.elasticsearch-language-server]
name = "Elasticsearch Language Server"
# Must match the language `name` in languages/elasticsearch/config.toml.
languages = ["Elasticsearch"]
